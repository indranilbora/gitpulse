name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: agentpulse-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: agentpulse-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: agentpulse-linux-x86_64
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: agentpulse-linux-arm64
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: agentpulse-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cargo (native)
        if: matrix.use_cross != true
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build with cross (cross-compiled)
        if: matrix.use_cross == true
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/agentpulse ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item "target\${{ matrix.target }}\release\agentpulse.exe" "${{ matrix.asset_name }}"

      - name: Smoke test binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          ./${{ matrix.asset_name }} --help > /dev/null

      - name: Smoke test binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          .\${{ matrix.asset_name }} --help | Out-Null

      - name: Generate SHA256 checksum (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          shasum -a 256 ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Generate SHA256 checksum (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Get-FileHash "${{ matrix.asset_name }}" -Algorithm SHA256 |
            Select-Object -ExpandProperty Hash |
            ForEach-Object { "$_ ${{ matrix.asset_name }}" } |
            Out-File -Encoding ascii "${{ matrix.asset_name }}.sha256"

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256

  source-package:
    name: Source Package + Homebrew Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source tarball and checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="agentpulse-${VERSION}-source.tar.gz"
          PREFIX="agentpulse-${VERSION}/"
          git archive --format=tar.gz --prefix="$PREFIX" "$GITHUB_REF_NAME" > "$ARCHIVE"
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

          SHA="$(awk '{print $1}' "$ARCHIVE.sha256")"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${ARCHIVE}"
          META="homebrew-stable-metadata-${VERSION}.txt"

          {
            echo "version: ${VERSION}"
            echo "archive: ${ARCHIVE}"
            echo "url: ${URL}"
            echo "sha256: ${SHA}"
            echo
            echo "formula snippet:"
            echo "  url \"${URL}\""
            echo "  sha256 \"${SHA}\""
          } > "$META"

      - name: Upload source archive and metadata
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agentpulse-*-source.tar.gz
            agentpulse-*-source.tar.gz.sha256
            homebrew-stable-metadata-*.txt

  publish-crates:
    name: Publish to crates.io
    needs:
      - build
      - source-package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
