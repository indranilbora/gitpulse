<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080" role="img" aria-label="AgentPulse CLI output screenshot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1800" height="1080" fill="#f3e8d9"/>
  <g transform="translate(92 84)" filter="url(#shadow)">
    <rect x="0" y="0" width="1616" height="912" rx="22" fill="url(#bg)" stroke="#2b3448" stroke-width="2"/>
    <rect x="0" y="0" width="1616" height="62" rx="22" fill="#1f2937"/>
    <rect x="0" y="42" width="1616" height="20" fill="#1f2937"/>

    <circle cx="32" cy="31" r="8" fill="#ef4444"/>
    <circle cx="58" cy="31" r="8" fill="#f59e0b"/>
    <circle cx="84" cy="31" r="8" fill="#22c55e"/>

    <text x="808" y="38" text-anchor="middle" fill="#d1d5db" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24">agentpulse --once</text>

    <g transform="translate(36 102)" font-family="SFMono-Regular, Menlo, Consolas, monospace">
      <text x="0" y="0" fill="#34d399" font-size="28">$ target/debug/agentpulse --once --dir /Users/indranilbora/gitpulse</text>
      <text x="0" y="56" fill="#e5e7eb" font-size="30">NAME      BRANCH  UNCOMMITTED     SYNC  NEXT    STATUS</text>
      <text x="0" y="98" fill="#9ca3af" font-size="28">─────────────────────────────────────────────────────────────</text>
      <text x="0" y="146" fill="#e5e7eb" font-size="30">● gitpulse  master           22        —  commit  uncommitted</text>

      <rect x="0" y="196" width="1544" height="1" fill="#253043"/>
      <text x="0" y="248" fill="#93c5fd" font-size="26">Tip: run `agentpulse` for the interactive dashboard.</text>
      <text x="0" y="292" fill="#93c5fd" font-size="26">Action safety is confirm-first by default.</text>

      <rect x="0" y="338" width="1544" height="1" fill="#253043"/>
      <text x="0" y="392" fill="#e5e7eb" font-size="26">Summary</text>
      <text x="0" y="434" fill="#d1d5db" font-size="24">• Repo health and worktree state in one view</text>
      <text x="0" y="472" fill="#d1d5db" font-size="24">• Dependency drift and process checks</text>
      <text x="0" y="510" fill="#d1d5db" font-size="24">• Explicit confirmations for destructive actions</text>
    </g>
  </g>
</svg>
